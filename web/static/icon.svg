<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8b1f5"/>
      <stop offset="100%" stop-color="#a889e6"/>
    </linearGradient>
    <radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff9dc0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff9dc0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- 装饰小星星 -->
  <g fill="white" opacity="0.55">
    <path d="M 80 120 L 88 138 L 106 140 L 92 152 L 96 172 L 80 162 L 64 172 L 68 152 L 54 140 L 72 138 Z"/>
    <path d="M 430 90 L 436 102 L 448 104 L 440 112 L 442 124 L 430 118 L 418 124 L 420 112 L 412 104 L 424 102 Z" transform="scale(0.85) translate(60, 20)"/>
    <circle cx="90" cy="380" r="4"/>
    <circle cx="440" cy="360" r="5"/>
    <circle cx="60" cy="260" r="3"/>
    <circle cx="470" cy="240" r="3"/>
  </g>

  <!-- 兔子耳朵 -->
  <ellipse cx="200" cy="180" rx="30" ry="80" fill="white"
    transform="rotate(-12 200 180)"/>
  <ellipse cx="200" cy="180" rx="14" ry="60" fill="#ff9dc0"
    transform="rotate(-12 200 180)"/>

  <ellipse cx="312" cy="180" rx="30" ry="80" fill="white"
    transform="rotate(12 312 180)"/>
  <ellipse cx="312" cy="180" rx="14" ry="60" fill="#ff9dc0"
    transform="rotate(12 312 180)"/>

  <!-- 兔子脸 -->
  <ellipse cx="256" cy="310" rx="130" ry="120" fill="white"/>

  <!-- 腮红 -->
  <ellipse cx="180" cy="330" rx="30" ry="20" fill="url(#cheek)"/>
  <ellipse cx="332" cy="330" rx="30" ry="20" fill="url(#cheek)"/>

  <!-- 眼睛（闭眼笑） -->
  <path d="M 205 300 Q 220 288 235 300" stroke="#3a2f4e" stroke-width="7"
    fill="none" stroke-linecap="round"/>
  <path d="M 277 300 Q 292 288 307 300" stroke="#3a2f4e" stroke-width="7"
    fill="none" stroke-linecap="round"/>

  <!-- 小星星在眼角 -->
  <path d="M 340 285 L 344 293 L 352 294 L 346 300 L 348 308 L 340 304 L 332 308 L 334 300 L 328 294 L 336 293 Z"
    fill="#ffcf7a"/>

  <!-- 嘴巴 -->
  <path d="M 246 340 L 256 348 L 266 340" stroke="#3a2f4e" stroke-width="5"
    fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 240 355 Q 256 368 272 355" stroke="#3a2f4e" stroke-width="5"
    fill="none" stroke-linecap="round"/>

  <!-- 顶部小星星（装饰） -->
  <g fill="#ffcf7a">
    <path d="M 256 90 L 262 104 L 278 106 L 266 116 L 270 132 L 256 124 L 242 132 L 246 116 L 234 106 L 250 104 Z"/>
  </g>
</svg>
